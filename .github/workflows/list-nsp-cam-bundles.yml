# #cursor generated code - start
name: list-nsp-cam-bundles

# Manual list: queries CAM REST for all artifact bundles.
# Same runner model as deploy/uninstall workflows (self-hosted Windows inside lab/VPN).
#
# Set repository secrets NSP_BASE_URL and CAM_TOKEN.
on:
  workflow_dispatch:

jobs:
  list-bundles:
    runs-on: [self-hosted, windows, x64]
    steps:
      - uses: actions/checkout@v4

      - name: List bundles via CAM REST
        shell: pwsh
        env:
          NSP_BASE_URL: ${{ secrets.NSP_BASE_URL }}
          CAM_TOKEN: ${{ secrets.CAM_TOKEN }}
          CAM_REST_API_VERSION: ${{ vars.CAM_REST_API_VERSION }}
          UPLOAD_INSTALL_DEBUG: ${{ vars.UPLOAD_INSTALL_DEBUG }}
        run: |
          $bash = Join-Path $env:ProgramFiles "Git\bin\bash.exe"
          if (-not (Test-Path -LiteralPath $bash)) {
            $bash = Join-Path ${env:ProgramFiles(x86)} "Git\bin\bash.exe"
          }
          if (-not (Test-Path -LiteralPath $bash)) {
            throw "Git for Windows not found (expected bash.exe under Git\bin)."
          }
          $ws = ($env:GITHUB_WORKSPACE -replace '\\', '/')
          & $bash -lc "set -euo pipefail; cd '$ws'; chmod +x scripts/list-bundles.sh 2>/dev/null || true; ./scripts/list-bundles.sh"
# #cursor generated code - end
