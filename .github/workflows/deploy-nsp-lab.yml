# #cursor generated code - start
name: deploy-nsp-lab

# Manual deploy: requires secrets (see repo README). Runs on a self-hosted Windows
# x64 runner so it can reach lab NSP (GitHub-hosted runners cannot).
#
# Runner labels: this job uses [self-hosted, windows, x64]. Your machine
# (e.g. C-PF68KS1H) must be registered with those default labels, OR add a
# unique custom label and change runs-on below to [self-hosted, YourLabel].
#
# Windows: use PowerShell to invoke Git Bash explicitly. If WSL is installed,
# shell: bash can resolve to System32 bash.exe and break temp script paths.
on:
  workflow_dispatch:

jobs:
  upload-install:
    runs-on: [self-hosted, windows, x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Repack bundle
        shell: pwsh
        run: |
          $bash = Join-Path $env:ProgramFiles "Git\bin\bash.exe"
          if (-not (Test-Path -LiteralPath $bash)) {
            $bash = Join-Path ${env:ProgramFiles(x86)} "Git\bin\bash.exe"
          }
          if (-not (Test-Path -LiteralPath $bash)) {
            throw "Git for Windows not found (expected bash.exe under Git\bin). Install from https://git-scm.com/download/win"
          }
          $ws = ($env:GITHUB_WORKSPACE -replace '\\', '/')
          & $bash -lc "set -euo pipefail; cd '$ws'; chmod +x scripts/repack.sh scripts/upload-and-install.sh 2>/dev/null || true; ./scripts/repack.sh"

      - name: Upload to file service and install
        shell: pwsh
        env:
          NSP_BASE_URL: ${{ secrets.NSP_BASE_URL }}
          CAM_TOKEN: ${{ secrets.CAM_TOKEN }}
          # NSP_TLS_INSECURE: optional. If unset, upload-and-install.sh defaults to 1 under GITHUB_ACTIONS (lab TLS).
          # Set NSP_TLS_INSECURE: "0" here to enforce certificate verification.
          # Optional: repository variable CAM_REST_API_VERSION (e.g. v3) pins install path; if unset, script tries v3, v2, v1.
          CAM_REST_API_VERSION: ${{ vars.CAM_REST_API_VERSION }}
          # Optional: set to 1 for extra stderr logs from upload-and-install.sh
          UPLOAD_INSTALL_DEBUG: ${{ vars.UPLOAD_INSTALL_DEBUG }}
        run: |
          $bash = Join-Path $env:ProgramFiles "Git\bin\bash.exe"
          if (-not (Test-Path -LiteralPath $bash)) {
            $bash = Join-Path ${env:ProgramFiles(x86)} "Git\bin\bash.exe"
          }
          if (-not (Test-Path -LiteralPath $bash)) {
            throw "Git for Windows not found (expected bash.exe under Git\bin)."
          }
          $ws = ($env:GITHUB_WORKSPACE -replace '\\', '/')
          & $bash -lc "set -euo pipefail; cd '$ws'; ./scripts/upload-and-install.sh"
# #cursor generated code - end
